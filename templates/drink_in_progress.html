<!DOCTYPE html>
<html>
<head>
    <title>Drink In Progress</title>
    <style>
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background-color: #2d3a4b;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        p {
            font-size: 24px;
            margin: 5px 0;
        }

        .refresh-message {
            color: #e74c3c;
            font-weight: bold;
            font-size: 28px;
        }
    </style>
</head>
<body>
    <h1>Drink In Progress</h1>
    <p>Making a delicious drink just for you...</p>
    <p>Please be patient while your drink is being prepared.</p>
    <p class="refresh-message">Do not refresh this page.</p>
    <script>
        setTimeout(function() {
            location.reload();
        }, 500); // 500 milliseconds (0.5 seconds)
    </script>
</body>
</html>
